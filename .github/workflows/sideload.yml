# Sideload build
#
# Builds the .s9pk on demand or when a release tag is pushed and:
#   * uploads it as a GitHub Actions artifact (always)
#   * attaches it to a GitHub Release named
#       "Elektron Net Pool StartOS Release v<X.Y.Z>:<R>"
#     (only when triggered by a tag matching `elektron-net-pool-v*`)
#
# Artifact and built s9pk filenames embed the full version from
# `startos/versions/current.ts`, including the StartOS revision suffix
# (e.g. version '4.0.1:2' -> `elektron-net-pool-4.0.1-r2.s9pk`). The
# revision is encoded as `-r<N>` so the filename stays POSIX-safe.
#
# Download the .s9pk from the run / release page and sideload it onto
# your StartOS server via:
#
#   StartOS UI -> System -> Sideload Service -> upload the .s9pk ...
#
# Self-contained: does NOT use start9labs/shared-workflows. That reusable
# workflow only runs `make`, which fails on a clean checkout because the
# Makefile's `INGREDIENTS := $(shell start-cli s9pk list-ingredients ...)`
# is evaluated at parse time from javascript/index.js, which hasn't been
# compiled yet. We bootstrap that file ourselves via npm install + npm run
# build (matching kutlusoy/elektron-net-startos's build.yml) before make.
#
# No secrets required: start-cli init-key generates an ephemeral signing
# key for each build. Set the DEV_KEY secret if you want stable signatures.

name: Sideload

on:
  workflow_dispatch:
  push:
    tags:
      - 'elektron-net-pool-v*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential python3 \
            squashfs-tools squashfs-tools-ng

      - name: Install start-cli
        run: curl -fsSL https://start9.com/start-cli/install.sh | sh

      - name: Install npm dependencies
        # Use `npm install` (not `npm ci`) so the new git dependency on
        # elektron-net-startos resolves even before package-lock.json is
        # regenerated. The lockfile is then written into the build dir
        # but not committed back — each CI run resolves fresh.
        run: npm install

      - name: Init developer key
        run: |
          if [ -n "${{ secrets.DEV_KEY }}" ]; then
            mkdir -p ~/.startos
            printf '%s' "${{ secrets.DEV_KEY }}" > ~/.startos/developer.key.pem
          else
            start-cli init-key
          fi

      - name: Compile TypeScript to javascript/index.js
        run: npm run build

      - name: Read package version from startos/versions/current.ts
        id: pkgver
        run: |
          # current.ts pins the canonical StartOS package version, e.g.
          #   version: '4.0.1:2'
          # We extract the literal verbatim, then derive a filename-safe
          # variant (`:` -> `-r`) for the artifact name.
          RAW=$(grep -oE "version: *'[^']+'" startos/versions/current.ts | head -1 | sed -E "s/version: *'(.*)'/\\1/")
          if [ -z "$RAW" ]; then
            echo "Failed to parse version from startos/versions/current.ts" >&2
            exit 1
          fi
          SAFE=$(echo "$RAW" | sed 's/:/-r/')
          echo "raw=${RAW}"   >> "$GITHUB_OUTPUT"
          echo "safe=${SAFE}" >> "$GITHUB_OUTPUT"
          echo "Package version: '${RAW}' (filename-safe: '${SAFE}')"

      - name: Build s9pk
        run: |
          RUST_LOG=debug RUST_BACKTRACE=1 make
          echo
          echo "SHA256SUMs:"
          sha256sum *.s9pk

      - name: Rename s9pk to include version+revision
        id: rename
        run: |
          SAFE='${{ steps.pkgver.outputs.safe }}'
          shopt -s nullglob
          renamed=()
          for f in *.s9pk; do
            base="${f%.s9pk}"
            # Avoid double-tagging if `make` already produced a versioned name.
            case "$base" in
              *"$SAFE") new="$f" ;;
              *)        new="${base}-${SAFE}.s9pk" ;;
            esac
            if [ "$new" != "$f" ]; then
              mv -- "$f" "$new"
            fi
            renamed+=("$new")
          done
          if [ ${#renamed[@]} -eq 0 ]; then
            echo "No .s9pk produced by make" >&2
            exit 1
          fi
          printf 'Renamed artifacts:\n'
          printf '  %s\n' "${renamed[@]}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: elektron-net-pool-s9pk-${{ steps.pkgver.outputs.safe }}
          path: '*.s9pk'
          if-no-files-found: error

      - name: Derive version from tag
        id: version
        if: startsWith(github.ref, 'refs/tags/elektron-net-pool-v')
        run: |
          TAG='${{ github.ref_name }}'
          VERSION="${TAG#elektron-net-pool-}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Tag '${TAG}' -> version '${VERSION}'"

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/elektron-net-pool-v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Elektron Net Pool StartOS Release ${{ steps.version.outputs.version }} (pkg ${{ steps.pkgver.outputs.raw }})"
          prerelease: ${{ contains(steps.version.outputs.version, '-rc') }}
          files: '*.s9pk'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
